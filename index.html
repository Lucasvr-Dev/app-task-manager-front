<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Diário Pet</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container py-4">

  <h1 class="text-center mb-4">Diário Pet</h1>

  <!-- PET -->
  <div class="card mb-3">
    <div class="card-body">
      <h4>Cadastrar Pet</h4>

      <form id="pet-form">
        <input class="form-control mb-2" id="pet-name" placeholder="Nome" required>
        <input class="form-control mb-2" id="pet-type" placeholder="Tipo" required>
        <input class="form-control mb-2" id="pet-age" type="number" placeholder="Idade" required>

        <button class="btn btn-primary">Salvar Pet</button>
      </form>
    </div>
  </div>

  <!-- ENTRY -->
  <div class="card">
    <div class="card-body">
      <h4>Novo Registro</h4>

      <form id="entry-form">
        <input class="form-control mb-2" id="title" placeholder="Título" required>
        <textarea class="form-control mb-2" id="description" placeholder="Descrição" required></textarea>
        <input class="form-control mb-2" id="happenedAt" type="datetime-local" required>

        <select id="pet-select" class="form-control mb-2" required></select>

        <button class="btn btn-success">Salvar Registro</button>
      </form>
    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>

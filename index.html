<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Gerenciador de Tarefas</title>

  <meta
    name="description"
    content="Aplicativo para organizar tarefas diárias de forma simples e moderna."
  />

  <meta name="theme-color" content="#22c55e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icons/favicon.ico" />

  <link rel="preload" href="style.css" as="style" />
  <link rel="stylesheet" href="style.css" />

  <script src="app.js" defer></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker
        .register("./service-worker.js")
        .then(() => console.log("PWA ativo"))
        .catch((error) => console.log("Erro SW:", error));
    }
  </script>
</head>

<body>
  <main>
    <div class="container">

      <h1>Gerenciador de Tarefas</h1>

      <div class="card">
        <form id="task-form">

          <label for="title" class="sr-only">Título da tarefa</label>
          <input
            id="title"
            name="title"
            placeholder="Título da tarefa"
            required
            autofocus
          />

          <label for="description" class="sr-only">Descrição da tarefa</label>
          <textarea
            id="description"
            name="description"
            placeholder="Descrição da tarefa"
          ></textarea>

          <label for="status" class="sr-only">Status da tarefa</label>
          <select id="status" name="status">
            <option value="pendente">Pendente</option>
            <option value="concluido">Concluído</option>
          </select>

          <label for="priority" class="sr-only">Prioridade da tarefa</label>
          <select id="priority" name="priority">
            <option value="baixa">Baixa</option>
            <option value="media" selected>Média</option>
            <option value="alta">Alta</option>
          </select>

          <label for="dueDate" class="sr-only">Data e horário limite</label>
          <input
            type="datetime-local"
            id="dueDate"
            name="dueDate"
          />

          <button
            type="submit"
            aria-label="Salvar tarefa"
          >
            Salvar Tarefa
          </button>

        </form>
      </div>

      <div class="card">
        <h2>Minhas Tarefas</h2>
        <div id="list"></div>
      </div>

    </div>
  </main>
</body>
</html>
